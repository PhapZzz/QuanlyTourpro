server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tourpro_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: Passw0rd
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 20

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  jwt:
    secret: tourpro_jwt_secret_key_must_be_at_least_256_bits_long_for_hs256_algorithm_2024
    expiration: 86400000       # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

logging:
  level:
    com.tourpro: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
